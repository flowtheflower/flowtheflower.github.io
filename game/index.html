<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOW: BLOOMFALL</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #back-btn {
            position: fixed;
            top: 15px; left: 15px;
            z-index: 9999;
            background: none;
            border: 1px solid rgba(0,255,65,0.4);
            color: #00ff41;
            padding: 7px 14px;
            font-family: monospace;
            font-size: 0.65rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <a href="../" id="back-btn">← EXIT</a>

    <!-- Load order matters: levels data must exist before game.js runs -->
    <script src="levels.js"></script>
    <script src="game.js"></script>
</body>
</html>
