<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOW: BLOOMFALL</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        #back-btn {
            position: fixed; top: 14px; left: 14px; z-index: 9999;
            background: none; border: 1px solid rgba(0,255,65,0.35);
            color: #00ff41; padding: 6px 12px;
            font-family: monospace; font-size: 0.6rem; letter-spacing: 2px;
            cursor: pointer; border-radius: 4px; text-decoration: none;
            transition: border-color 0.2s, background 0.2s;
        }
        #back-btn:hover { border-color: #00ff41; background: rgba(0,255,65,0.06); }
        canvas { display: block; }
    </style>
</head>
<body>
    <a href="../" id="back-btn">← EXIT</a>
    <script src="levels.js"></script>
    <script src="game.js"></script>
</body>
</html>
