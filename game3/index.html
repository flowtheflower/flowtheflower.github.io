<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Flow's Garden Planet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',system-ui,Arial,sans-serif;touch-action:none}
canvas{display:block;position:fixed;top:0;left:0}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:14px 16px;pointer-events:none;z-index:30}
.pill{display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.48);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:30px;padding:7px 15px;color:#fff;font-size:13px;font-weight:600;letter-spacing:.2px}

/* Interaction prompt */
#interact-prompt{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:30;opacity:0;transition:opacity .25s,transform .15s;white-space:nowrap}
.is-touch #interact-prompt{pointer-events:auto;cursor:pointer}
.is-touch #interact-prompt .ip-inner{cursor:pointer}
.is-touch #interact-prompt:active{transform:translateX(-50%) scale(0.95)}
#interact-prompt .ip-inner{background:rgba(0,0,0,.72);backdrop-filter:blur(10px);border:1.5px solid rgba(120,255,160,.4);border-radius:50px;padding:10px 22px;color:#8fff9a;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase}

/* Dialogue */
#dlg{position:fixed;bottom:0;left:0;right:0;z-index:40;transform:translateY(105%);transition:transform .38s cubic-bezier(.22,1,.36,1);max-width:600px;margin:0 auto}
#dlg.show{transform:translateY(0)}
#dlg-inner{background:rgba(6,18,10,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(90,255,130,.2);padding:18px 20px 22px}
#dlg-header{display:flex;align-items:center;gap:14px;margin-bottom:12px}
#dlg-avatar{width:54px;height:54px;border-radius:50%;border:2.5px solid rgba(90,255,130,.5);display:flex;align-items:center;justify-content:center;font-size:28px;background:rgba(0,0,0,.4);flex-shrink:0}
#dlg-name{color:#7fff9a;font-size:12px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:3px}
#dlg-text{color:rgba(255,255,255,.9);font-size:15px;line-height:1.7}
#dlg-btn{display:block;margin-top:14px;margin-left:auto;background:rgba(90,255,130,.15);border:1.5px solid rgba(90,255,130,.4);border-radius:50px;color:#7fff9a;font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:9px 26px;cursor:pointer;pointer-events:all}

/* Joystick */
#jbase{position:fixed;width:110px;height:110px;border-radius:50%;border:2px solid rgba(255,255,255,.22);background:rgba(255,255,255,.06);transform:translate(-50%,-50%);display:none;pointer-events:none;z-index:25}
#jnub{position:fixed;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.38);border:2px solid rgba(255,255,255,.6);transform:translate(-50%,-50%);display:none;pointer-events:none;z-index:26}
#run-ring{position:fixed;width:118px;height:118px;border-radius:50%;border:2.5px solid rgba(0,230,255,.5);transform:translate(-50%,-50%);display:none;pointer-events:none;z-index:24}

/* Title */
#title{position:fixed;inset:0;z-index:80;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 80% at 50% 60%,#051a0a 0%,#000 100%);gap:18px}
#title h1{font-size:clamp(34px,8vw,72px);font-weight:900;letter-spacing:4px;text-align:center;line-height:1;background:linear-gradient(135deg,#6fff9a,#00e8b0,#7adfff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#title p{color:rgba(255,255,255,.45);font-size:14px;text-align:center;max-width:280px;line-height:1.6}
.hint-list{display:grid;grid-template-columns:1fr 1fr;gap:8px 22px;font-size:12px}
.hint-list li{color:rgba(255,255,255,.38);list-style:none;display:flex;align-items:center;gap:7px}
.hint-list kbd{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:4px;padding:1px 6px;color:rgba(255,255,255,.6);font-size:11px;font-family:inherit}
#start{background:linear-gradient(135deg,#3dbe50,#00a87a);border:none;color:#fff;font-size:16px;font-weight:800;padding:15px 50px;border-radius:50px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;box-shadow:0 6px 28px rgba(61,190,80,.45);margin-top:8px}

/* Camera hint */
#cam-hint{position:fixed;bottom:16px;right:16px;color:rgba(255,255,255,.28);font-size:11px;pointer-events:none;z-index:20}
</style>
</head>
<body>

<div id="title">
  <h1>FLOW'S<br>GARDEN PLANET</h1>
  <p>Wander a lush world and meet its curious inhabitants</p>
  <ul class="hint-list">
    <li>📱 Tap &amp; drag — walk</li>
    <li>📱 Double-tap &amp; drag — run</li>
    <li><kbd>WASD</kbd> — move</li>
    <li><kbd>Shift</kbd> — run</li>
    <li>🖱 Right-drag — rotate cam</li>
    <li><kbd>E</kbd> — talk to NPC</li>
  </ul>
  <button id="start">ENTER THE GARDEN</button>
</div>

<canvas id="c"></canvas>

<div id="hud">
  <div class="pill">🌿 <span id="h-steps">0 steps</span></div>
  <div class="pill">☀️ <span id="h-time">Morning</span></div>
</div>

<div id="interact-prompt"><div class="ip-inner" id="ip-inner">Talk to <span id="ip-name"></span> &nbsp;·&nbsp; <span id="ip-action">press E</span></div></div>

<div id="dlg">
  <div id="dlg-inner">
    <div id="dlg-header">
      <div id="dlg-avatar"><span id="dlg-emoji">🌿</span></div>
      <div><div id="dlg-name">NAME</div></div>
    </div>
    <div id="dlg-text"></div>
    <button id="dlg-btn">CONTINUE ›</button>
  </div>
</div>

<div id="jbase"></div>
<div id="run-ring"></div>
<div id="jnub"></div>

<div id="cam-hint">Right-drag to orbit camera</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const PR   = 18;          // planet radius (world units)
const CHAR_SCALE = 0.90;  // character scale
const FOOT_OFFSET = 0.176; // distance from flowRoot origin (y=0) down to the actual sole bottom, at CHAR_SCALE
const WALK_SPD = 0.022;   // radians/frame approx
const RUN_SPD  = 0.055;
const CAM_BACK = 6.5;     // camera distance behind player
const CAM_UP   = 2.8;     // camera height above player
const IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints>0);
if(IS_TOUCH) document.body.classList.add('is-touch');

// ═══════════════════════════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x8ecab0, 0.015);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.05, 600);
camera.position.set(0, PR+CAM_UP+5, PR+CAM_BACK+5);
camera.lookAt(0, PR, 0);

// ═══════════════════════════════════════════════════════════
// SKY SHADER
// ═══════════════════════════════════════════════════════════
const skyUniforms = {
  skyTop:   {value: new THREE.Color(0x0a1830)},
  skyMid:   {value: new THREE.Color(0x3a8ec8)},
  skyHor:   {value: new THREE.Color(0x90d8b8)},
  sunDir:   {value: new THREE.Vector3(0.4,0.8,0.3).normalize()},
  sunCol:   {value: new THREE.Color(1.0,0.92,0.7)},
};
const skyMat = new THREE.ShaderMaterial({
  uniforms: skyUniforms, side: THREE.BackSide,
  vertexShader:`varying vec3 vW;void main(){vW=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    uniform vec3 skyTop,skyMid,skyHor,sunDir,sunCol;
    varying vec3 vW;
    void main(){
      vec3 d=normalize(vW);
      float h=clamp(d.y,0.,1.);
      float nh=clamp(-d.y,0.,1.);
      vec3 c=mix(mix(skyHor,skyMid,h),skyTop,h*h);
      c=mix(c,skyHor*0.7,nh*0.6);
      float sun=pow(max(dot(d,sunDir),0.),200.)*4.;
      float halo=pow(max(dot(d,sunDir),0.),6.)*.15;
      c+=sunCol*(sun+halo);
      gl_FragColor=vec4(c,1.);
    }
  `
});
const skyDome = new THREE.Mesh(new THREE.SphereGeometry(400,32,16), skyMat);
scene.add(skyDome);

// Stars
{
  const sg=new THREE.BufferGeometry();
  const sa=new Float32Array(2400);
  for(let i=0;i<800;i++){
    const v=new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize().multiplyScalar(350+Math.random()*30);
    sa[i*3]=v.x;sa[i*3+1]=v.y;sa[i*3+2]=v.z;
  }
  sg.setAttribute('position',new THREE.BufferAttribute(sa,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:1.2,transparent:true,opacity:.7,sizeAttenuation:true})));
}

// ═══════════════════════════════════════════════════════════
// LIGHTING
// ═══════════════════════════════════════════════════════════
const hemi = new THREE.HemisphereLight(0x9ad5c0, 0x184010, 2.0);
scene.add(hemi);

const sun = new THREE.DirectionalLight(0xffe5b0, 4.5);
sun.position.set(28,55,20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1; sun.shadow.camera.far=160;
sun.shadow.camera.left=sun.shadow.camera.bottom=-55;
sun.shadow.camera.right=sun.shadow.camera.top=55;
sun.shadow.bias=-0.0005; sun.shadow.normalBias=0.03;
scene.add(sun);
const fill2=new THREE.DirectionalLight(0x5599ff,0.7); fill2.position.set(-20,5,-18); scene.add(fill2);
const rim=new THREE.DirectionalLight(0xff8833,0.35); rim.position.set(0,-30,0); scene.add(rim);

// ═══════════════════════════════════════════════════════════
// PLANET GEOMETRY  (vertex-coloured displaced sphere)
// ═══════════════════════════════════════════════════════════
const planetGroup = new THREE.Group();
scene.add(planetGroup);

function snoise(x,y,z){
  // cheap pseudo-noise
  return Math.sin(x*1.3+y*.9)*Math.cos(y*1.1+z*.8)*Math.sin(z*1.2+x*.7);
}
function fbm(x,y,z,oct=4){
  let v=0,a=0.5,f=1;
  for(let i=0;i<oct;i++){v+=snoise(x*f,y*f,z*f)*a;a*=.5;f*=2.1;}
  return v;
}

// Returns the exact displaced radius of the planet surface at a given unit direction.
// Mirrors the displacement formula used when building planGeo so the character
// (and anything else) can sit precisely on the visible terrain, not at a flat PR.
function terrainRadius(dirVec){
  const nx=dirVec.x, ny=dirVec.y, nz=dirVec.z; // already unit length
  const h = fbm(nx*0.8,ny*0.8,nz*0.8) * 0.7 + fbm(nx*2.2,ny*2.2,nz*2.2)*0.28;
  return PR + h*1.1;
}

const planGeo = new THREE.SphereGeometry(PR, 128, 128);
const planPos = planGeo.attributes.position;
const planColArr = new Float32Array(planPos.count*3);
for(let i=0;i<planPos.count;i++){
  const x=planPos.getX(i), y=planPos.getY(i), z=planPos.getZ(i);
  const nx=x/PR, ny=y/PR, nz=z/PR;
  const h = fbm(nx*0.8,ny*0.8,nz*0.8) * 0.7 + fbm(nx*2.2,ny*2.2,nz*2.2)*0.28;
  const r = (PR + h*1.1) / Math.sqrt(x*x+y*y+z*z);
  planPos.setXYZ(i, x*r, y*r, z*r);
  // vertex colour: height-based green gradient
  const ht = (r-0.9)*3; // 0..1 ish
  const bright = 0.28 + Math.max(0,ht)*0.22 + h*0.08;
  const sat = 0.6 + ht*0.15;
  const c = new THREE.Color().setHSL(0.32-ht*0.04, sat, bright);
  planColArr[i*3]=c.r; planColArr[i*3+1]=c.g; planColArr[i*3+2]=c.b;
}
planGeo.computeVertexNormals();
planGeo.setAttribute('color', new THREE.BufferAttribute(planColArr,3));
const planMat = new THREE.MeshStandardMaterial({vertexColors:true, roughness:0.88, metalness:0});
const planet = new THREE.Mesh(planGeo, planMat);
planet.receiveShadow=true;
planetGroup.add(planet);

// ── surface helpers ──────────────────────────────────────
function surfDir(polar,az){ return new THREE.Vector3(Math.sin(polar)*Math.cos(az), Math.cos(polar), Math.sin(polar)*Math.sin(az)).normalize(); }
function surfPt(dir,extra=0){ return dir.clone().multiplyScalar(PR+extra); }
function placeOnSurface(obj, dir, extraH=0, yaw=0){
  const up=dir.clone().normalize();
  const q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),up);
  if(Math.abs(yaw)>.0001){
    const sq=new THREE.Quaternion().setFromAxisAngle(up,yaw);
    q.premultiply(sq);
  }
  obj.quaternion.copy(q);
  obj.position.copy(dir.clone().multiplyScalar(PR+extraH));
}

// ═══════════════════════════════════════════════════════════
// WATER SHADER (river)
// ═══════════════════════════════════════════════════════════
const waterUniforms = {
  time:{value:0},
  deep:{value:new THREE.Color(0x0a4a82)},
  mid:{value:new THREE.Color(0x2f8fc4)},
  shallow:{value:new THREE.Color(0x6fd0ea)},
  foamCol:{value:new THREE.Color(0xf2feff)}
};
const waterMat = new THREE.ShaderMaterial({
  uniforms:waterUniforms,
  transparent:true,
  side:THREE.DoubleSide,
  vertexShader:`
    varying vec2 vUv;
    varying vec3 vNorm;
    varying vec3 vViewDir;
    void main(){
      vUv=uv;
      vNorm=normalMatrix*normal;
      vec4 mv=modelViewMatrix*vec4(position,1.);
      vViewDir=normalize(-mv.xyz);
      gl_Position=projectionMatrix*mv;
    }
  `,
  fragmentShader:`
    uniform float time;
    uniform vec3 deep,mid,shallow,foamCol;
    varying vec2 vUv;
    varying vec3 vNorm;
    varying vec3 vViewDir;

    // Cheap 2D hash + value noise for organic, non-repeating ripple distortion
    float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
    float vnoise(vec2 p){
      vec2 i=floor(p), f=fract(p);
      float a=hash(i), b=hash(i+vec2(1.,0.)), c=hash(i+vec2(0.,1.)), d=hash(i+vec2(1.,1.));
      vec2 u=f*f*(3.-2.*f);
      return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
    }
    float fbm(vec2 p){
      float v=0., a=0.5;
      for(int i=0;i<4;i++){ v+=vnoise(p)*a; p*=2.05; a*=0.5; }
      return v;
    }

    void main(){
      // UV.y runs along the river length (flow direction), UV.x around circumference
      vec2 flowUv = vUv * vec2(3.2, 16.0);
      flowUv.y -= time*1.7; // scroll downstream

      // Layered organic ripple distortion (replaces rigid sine stripes)
      float n1 = fbm(flowUv*0.6 + vec2(0.0, time*0.6));
      float n2 = fbm(flowUv*1.3 - vec2(0.0, time*1.1) + 50.0);
      float surface = n1*0.6 + n2*0.4;

      // Depth-based base colour (deep -> mid -> shallow across the width)
      float widthT = abs(vUv.x*2.0-1.0); // 0 at centre, 1 at edges
      vec3 base = mix(deep, mid, smoothstep(0.0,0.55,widthT));
      base = mix(base, shallow, smoothstep(0.55,1.0,widthT));
      base = mix(base, base*1.18+0.04, surface);

      // Flow streaks: elongated bright bands moving downstream, organic not linear
      float streakMask = fbm(flowUv*vec2(0.4,2.2) + vec2(0.0,-time*2.0));
      float streaks = smoothstep(0.62,0.92,streakMask);
      base = mix(base, foamCol, streaks*0.45);

      // Foam fleck sparkle (small bright dots, time-varying)
      float sparkle = fbm(flowUv*4.0 + vec2(time*0.8,-time*2.4));
      float flecks = smoothstep(0.88,0.97,sparkle);
      base += foamCol*flecks*0.5;

      // Bank-edge foam (brighter near vUv.x extremes where water meets bank)
      float edgeFoam = smoothstep(0.80,1.0,widthT) * (0.5+0.5*sin(vUv.y*40.0-time*3.0));
      base = mix(base, foamCol, edgeFoam*0.4);

      // Fresnel-style rim brightening for a wet, reflective look
      float fres = pow(1.0-clamp(dot(normalize(vNorm),normalize(vViewDir)),0.0,1.0), 2.5);
      base += foamCol*fres*0.25;

      // Specular sun glint, broken up by the surface noise for realism
      float spec = pow(max(dot(normalize(vNorm), normalize(vec3(0.5,1.0,0.3))), 0.0), 40.0);
      spec *= 0.6 + surface*0.8;
      base += vec3(1.0,0.98,0.9)*spec*0.7;

      gl_FragColor = vec4(base, 0.90);
    }
  `
});

function buildRiver(){
  // The base planet mesh is a SOLID, continuous sphere with no holes cut into
  // it anywhere — so the river cannot be "carved into" the ground; it must sit
  // visibly ABOVE the solid terrain surface, the same way trees/flowers/banks
  // already do. A small downward offset would simply bury it inside the opaque
  // ground mesh, invisible. This mirrors how the riverbank already correctly
  // pokes up above terrain.
  const N=140;
  const centerDirs=[];
  for(let i=0;i<=N;i++){
    const t=i/N;
    const ang=t*Math.PI*2.2 + Math.sin(t*Math.PI*4)*0.3;
    const lat=(Math.sin(t*Math.PI)*0.55 + Math.sin(t*Math.PI*3.5)*.12);
    const nx=Math.cos(lat)*Math.cos(ang), ny=Math.sin(lat), nz=Math.cos(lat)*Math.sin(ang);
    centerDirs.push(new THREE.Vector3(nx,ny,nz).normalize());
  }

  const WATER_W=2.4;     // half-width of the water surface
  const BANK_W=3.1;      // half-width including the surrounding raised bank
  const WATER_RAISE=0.10;// water sits this far ABOVE the solid ground mesh
  const BANK_RAISE=0.22; // bank's outer lip rises a bit higher than the water

  function sideAt(i){
    const dir=centerDirs[i];
    const prev=centerDirs[Math.max(0,i-1)];
    const next=centerDirs[Math.min(N,i+1)];
    const travel=next.clone().sub(prev);
    if(travel.lengthSq()<1e-8) travel.set(1,0,0);
    travel.normalize();
    return {dir, side:new THREE.Vector3().crossVectors(dir,travel).normalize()};
  }

  function buildStrip(wFn, rFn, segs){
    const positions=[], normals=[], uvs=[], indices=[];
    for(let i=0;i<=N;i++){
      const {dir, side}=sideAt(i);
      for(let s=0;s<=segs;s++){
        const w=wFn(s,segs);
        const offsetDir=dir.clone().addScaledVector(side, w/PR).normalize();
        const r=rFn(offsetDir, s, segs);
        const p=offsetDir.clone().multiplyScalar(r);
        positions.push(p.x,p.y,p.z);
        normals.push(offsetDir.x,offsetDir.y,offsetDir.z);
        uvs.push(s/segs, i/N);
      }
    }
    for(let i=0;i<N;i++){
      for(let s=0;s<segs;s++){
        const a=i*(segs+1)+s, b=a+1, c=a+segs+1, d=c+1;
        indices.push(a,c,b, b,c,d);
      }
    }
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
    geo.setAttribute('normal',   new THREE.Float32BufferAttribute(normals,3));
    geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs,2));
    geo.setIndex(indices);
    return geo;
  }

  // Water surface: clearly above the solid ground everywhere across its width
  const waterGeo=buildStrip(
    (s,segs)=>(s/segs*2-1)*WATER_W,
    (offsetDir)=>terrainRadius(offsetDir)+WATER_RAISE,
    14
  );
  river=new THREE.Mesh(waterGeo, waterMat);
  river.receiveShadow=true;
  planetGroup.add(river);

  // Banks: flush with the water's raised height at the inner edge, rising
  // a little higher toward the outer edge so they read as a framing berm.
  const bankMat=new THREE.MeshStandardMaterial({color:0x6b5530,roughness:0.95});
  [1,-1].forEach(sign=>{
    const bankGeo=buildStrip(
      (s,segs)=>sign*(WATER_W + (s/segs)*(BANK_W-WATER_W)),
      (offsetDir,s,segs)=>{
        const t=s/segs;
        const raise=WATER_RAISE + t*(BANK_RAISE-WATER_RAISE);
        return terrainRadius(offsetDir) + raise;
      },
      8
    );
    const bank=new THREE.Mesh(bankGeo, bankMat);
    bank.receiveShadow=true; bank.castShadow=true;
    planetGroup.add(bank);
  });

  // Thin bright foam line right at the water's edge on both sides
  const foamMat=new THREE.MeshBasicMaterial({color:0xf2feff,transparent:true,opacity:0.7,side:THREE.DoubleSide});
  [1,-1].forEach(sign=>{
    const fw=0.20;
    const foamGeo=buildStrip(
      (s)=>sign*(WATER_W-fw + s*fw),
      (offsetDir)=>terrainRadius(offsetDir)+WATER_RAISE+0.02,
      1
    );
    planetGroup.add(new THREE.Mesh(foamGeo, foamMat));
  });
}
let river=null;
buildRiver();

// ═══════════════════════════════════════════════════════════
// FLOWERS
// ═══════════════════════════════════════════════════════════
const STEM_MAT  = new THREE.MeshStandardMaterial({color:0x22882a,roughness:0.85});
const LEAF_MAT  = new THREE.MeshStandardMaterial({color:0x2a9e32,roughness:0.8,side:THREE.DoubleSide});

const PETAL_DEFS=[
  {pc:0xff4488,cc:0xffee00,petals:6,pr:0.13,ph:0.62,style:'round'},
  {pc:0xff8800,cc:0xffff66,petals:8,pr:0.10,ph:0.55,style:'pointed'},
  {pc:0xcc44ff,cc:0xffee55,petals:5,pr:0.14,ph:0.68,style:'round'},
  {pc:0xff2244,cc:0xffaa00,petals:7,pr:0.11,ph:0.58,style:'round'},
  {pc:0xffffff,cc:0xffdd00,petals:6,pr:0.12,ph:0.52,style:'pointed'},
  {pc:0x66ccff,cc:0xffffff,petals:8,pr:0.10,ph:0.60,style:'round'},
  {pc:0xffdd44,cc:0xff6600,petals:5,pr:0.15,ph:0.70,style:'round'},
  {pc:0xff66cc,cc:0xffee88,petals:6,pr:0.12,ph:0.56,style:'pointed'},
  {pc:0x88ff44,cc:0xff8800,petals:7,pr:0.11,ph:0.64,style:'round'},
  {pc:0xee2266,cc:0xffcc00,petals:5,pr:0.13,ph:0.60,style:'pointed'},
];
const flowerObjs=[];

function makeFlower(def,scale=1){
  const g=new THREE.Group();
  const{pc,cc,petals,pr,ph,style}=def;
  const h=ph*scale;

  // Stem
  const stGeo=new THREE.CylinderGeometry(0.025*scale,0.038*scale,h,7);
  const st=new THREE.Mesh(stGeo,STEM_MAT);
  st.position.y=h*.5; st.castShadow=true; g.add(st);

  // Leaf pair
  for(let side of[-1,1]){
    const lGeo=new THREE.SphereGeometry(0.14*scale,7,5);
    lGeo.scale(1.8,.18,.7);
    const lf=new THREE.Mesh(lGeo,LEAF_MAT);
    lf.position.set(side*0.06*scale,h*.38,0);
    lf.rotation.z=side*0.55;
    g.add(lf);
  }

  // Petals
  const pm=new THREE.MeshStandardMaterial({color:pc,roughness:0.55,side:THREE.DoubleSide});
  for(let p=0;p<petals;p++){
    const ang=p/petals*Math.PI*2;
    const pGeo = style==='round'
      ? new THREE.SphereGeometry(pr*scale,8,6)
      : new THREE.ConeGeometry(pr*scale*.7,pr*scale*2,6);
    pGeo.scale(1,style==='round'?1.55:1,0.32);
    const petal=new THREE.Mesh(pGeo,pm);
    petal.position.set(Math.cos(ang)*pr*scale*0.85, h+0.04*scale, Math.sin(ang)*pr*scale*0.85);
    if(style==='pointed') petal.rotation.x=Math.PI/2;
    petal.rotation.y=ang;
    petal.castShadow=true;
    g.add(petal);
  }

  // Centre
  const cm=new THREE.MeshStandardMaterial({color:cc,roughness:0.3,metalness:0.1,emissive:new THREE.Color(cc).multiplyScalar(0.12)});
  const centre=new THREE.Mesh(new THREE.SphereGeometry(pr*scale*.85,12,10),cm);
  centre.position.y=h+0.06*scale;
  centre.scale.y=0.42;
  centre.castShadow=true;
  g.add(centre);

  g.userData.swayPhase=Math.random()*Math.PI*2;
  g.userData.stemH=h;
  return g;
}

// Scatter flowers
for(let i=0;i<320;i++){
  const dir=new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize();
  const def=PETAL_DEFS[i%PETAL_DEFS.length];
  const sc=0.48+Math.random()*0.7;
  const fg=makeFlower(def,sc);
  const g=new THREE.Group();
  g.add(fg);
  placeOnSurface(g,dir,0.0);
  planetGroup.add(g);
  flowerObjs.push({wrapper:g,flower:fg});
}

function makeRoundTree(sc){
  const g=new THREE.Group();
  const bk=new THREE.MeshStandardMaterial({color:0x3d2008,roughness:0.95});
  const tk=new THREE.Mesh(new THREE.CylinderGeometry(.13*sc,.21*sc,2.2*sc,10),bk);
  tk.position.y=1.1*sc; tk.castShadow=true; g.add(tk);
  // root flares
  for(let r=0;r<5;r++){
    const ang=r/5*Math.PI*2;
    const fl=new THREE.Mesh(new THREE.CylinderGeometry(.06*sc,.18*sc,.55*sc,7),bk);
    fl.position.set(Math.cos(ang)*.16*sc,.28*sc,Math.sin(ang)*.16*sc);
    fl.rotation.z=Math.cos(ang)*0.55; fl.rotation.x=Math.sin(ang)*0.55;
    g.add(fl);
  }
  const mats=[0x2a7028,0x349232,0x44b040,0x3a9c38,0x28882a];
  // 4-lobe crown
  [[0,.45,0,1.18],[.28,.52,.20,.88],[-.28,.50,-.18,.82],[.10,.62,-.22,.76],[-.12,.60,.20,.72]].forEach(([x,dy,z,r],i)=>{
    const cg=new THREE.SphereGeometry(r*sc,14,12);
    const c=new THREE.Mesh(cg,new THREE.MeshStandardMaterial({color:mats[i%mats.length],roughness:0.82}));
    c.position.set(x*sc,(2.0+dy)*sc,z*sc); c.castShadow=true; g.add(c);
  });
  return g;
}
function makeTallTree(sc){
  const g=new THREE.Group();
  const bk=new THREE.MeshStandardMaterial({color:0x2a1a08,roughness:0.95});
  const tk=new THREE.Mesh(new THREE.CylinderGeometry(.09*sc,.17*sc,3.2*sc,9),bk);
  tk.position.y=1.6*sc; tk.castShadow=true; g.add(tk);
  [[2.8,.95],[2.2,.82],[1.7,.68],[1.25,.54],[0.82,.4]].forEach(([y,r],i)=>{
    const layer=new THREE.Mesh(new THREE.ConeGeometry(r*sc,1.1*sc,12),
      new THREE.MeshStandardMaterial({color:i%2?0x1f6020:0x2a8028,roughness:0.84}));
    layer.position.y=y*sc; layer.castShadow=true; g.add(layer);
  });
  return g;
}
function makeTropicalTree(sc){
  const g=new THREE.Group();
  const bk=new THREE.MeshStandardMaterial({color:0x6b4010,roughness:0.9});
  const tk=new THREE.Mesh(new THREE.CylinderGeometry(.11*sc,.16*sc,2.8*sc,9),bk);
  tk.position.y=1.4*sc; tk.rotation.z=.14; tk.castShadow=true; g.add(tk);
  // Bark rings
  for(let i=0;i<8;i++){
    const ring=new THREE.Mesh(new THREE.TorusGeometry(.12*sc,.018*sc,5,14),
      new THREE.MeshStandardMaterial({color:0x8b5a20,roughness:.95}));
    ring.position.y=i*.3*sc+.2*sc; ring.rotation.x=Math.PI/2; g.add(ring);
  }
  // Fronds
  const fm=new THREE.MeshStandardMaterial({color:0x3cb840,roughness:.7,side:THREE.DoubleSide});
  for(let f=0;f<8;f++){
    const ang=f/8*Math.PI*2;
    const fGeo=new THREE.SphereGeometry(.19*sc,8,5); fGeo.scale(3.5,.14,.6);
    const frond=new THREE.Mesh(fGeo,fm);
    frond.position.set(Math.cos(ang)*.4*sc,2.82*sc,Math.sin(ang)*.4*sc);
    frond.rotation.set(-0.55,ang,0.18); frond.castShadow=true; g.add(frond);
    // Leaflets along frond
    for(let l=1;l<5;l++){
      const t=l/5;
      const lf=new THREE.Mesh(new THREE.SphereGeometry(.08*sc,5,4),fm);
      lf.scale.set(1.8,.12,.55);
      lf.position.set(Math.cos(ang)*(0.4+t*.8)*sc,2.82*sc-t*.2*sc,Math.sin(ang)*(0.4+t*.8)*sc);
      lf.rotation.copy(frond.rotation);
      g.add(lf);
    }
  }
  // Coconuts
  const cm=new THREE.MeshStandardMaterial({color:0x7b4a18,roughness:.9});
  for(let n=0;n<4;n++){
    const nut=new THREE.Mesh(new THREE.SphereGeometry(.1*sc,9,9),cm);
    nut.position.set(Math.cos(n/4*Math.PI*2)*.22*sc,2.7*sc,Math.sin(n/4*Math.PI*2)*.22*sc);
    g.add(nut);
  }
  return g;
}

const TREE_BUILDERS=[makeRoundTree,makeTallTree,makeTropicalTree];
for(let i=0;i<60;i++){
  const dir=new THREE.Vector3(Math.random()-.5,Math.random()-.5,Math.random()-.5).normalize();

}

// ═══════════════════════════════════════════════════════════
// FLOW CHARACTER  — pivot at feet, body rises upward
// ═══════════════════════════════════════════════════════════
// All positions are in local space where Y=0 is the foot/ground plane.
// Body center sits at y~0.85, crown at y~1.65, feet at y~0.

function buildFlow(){
  const root=new THREE.Group();  // root stays at y=0 (foot level)

  // Shared materials
  const BDY = new THREE.MeshStandardMaterial({color:0x3ec840,roughness:0.68,metalness:0.04});
  const BMP = new THREE.MeshStandardMaterial({color:0x4fd855,roughness:0.72});
  const DRK = new THREE.MeshStandardMaterial({color:0x279018,roughness:0.85});
  const BLK = new THREE.MeshStandardMaterial({color:0x0c0c0c,roughness:0.85});
  const WHT = new THREE.MeshStandardMaterial({color:0xf5f5f5,roughness:0.3});
  const GRY = new THREE.MeshStandardMaterial({color:0xb8b8b8,roughness:0.55});
  const BRN = new THREE.MeshStandardMaterial({color:0x5c3010,roughness:0.9});
  const PNK = new THREE.MeshStandardMaterial({color:0xff5577,roughness:0.7,transparent:true,opacity:0.75});
  const RED = new THREE.MeshStandardMaterial({color:0xff2233,roughness:0.6});
  const TNG = new THREE.MeshStandardMaterial({color:0xff6655,roughness:0.65});
  const EWH = new THREE.MeshStandardMaterial({color:0xfafafa,roughness:0.2});
  const EPU = new THREE.MeshStandardMaterial({color:0x080814,roughness:0.05,metalness:0.5});
  const SHN = new THREE.MeshStandardMaterial({color:0xffffff,emissive:new THREE.Color(1,1,1),emissiveIntensity:1.8,roughness:0});

  const BODY_Y = 0.85; // body centre height

  // ── BODY: bumpy bud (slightly pointed top, bumpy surface)
  const bGeo=new THREE.SphereGeometry(0.60,56,56);
  const bP=bGeo.attributes.position;
  for(let i=0;i<bP.count;i++){
    let x=bP.getX(i),y=bP.getY(i),z=bP.getZ(i);
    const l=Math.sqrt(x*x+y*y+z*z);
    const yn=y/l;
    // Pointy top
    const topW=1.0+Math.max(0,yn)*0.28;
    // Bottom slightly flattened
    const botW=1.0+Math.min(0,yn)*0.08;
    // Surface bumps
    const bmp=Math.sin(x*13)*Math.cos(y*11)*Math.sin(z*14)*0.058
             +Math.sin(x*7.5+1)*Math.sin(z*8.2+2)*0.030
             +Math.cos(y*16+x*5)*0.018;
    const nr=(0.60+bmp)*topW*(1+botW-1);
    const s=nr/l;
    bP.setXYZ(i,x*s,y*s,z*s);
  }
  bGeo.computeVertexNormals();
  const body=new THREE.Mesh(bGeo,BDY);
  body.position.y=BODY_Y; body.castShadow=true;
  root.add(body);

  // Extra surface bumps (scattered spheres on body surface)
  [
    [.34,.42,.22],[-.32,.40,.26],[.16,.54,-.20],[-.18,.52,.30],
    [.44,.14,.24],[-.40,.12,-.24],[.10,.24,-.50],[-.10,.20,.47],
    [.28,-.06,.42],[-.30,-.04,-.38],[0,.58,.14],[.38,.30,-.30],
    [-.36,.28,.32],[.20,.48,.38],[-.22,.44,-.38],[0,.50,-.46]
  ].forEach(([bx,by,bz])=>{
    const r=.068+Math.random()*.04;
    const bm=new THREE.Mesh(new THREE.SphereGeometry(r,9,9),BMP);
    bm.position.set(bx,BODY_Y+by,bz);
    bm.castShadow=true; root.add(bm);
  });

  // ── EYES  (very large, oval, cartoon)
  const EYE_Z=0.53, EYE_Y=BODY_Y+0.17;
  for(const side of[-1,1]){
    const ex=side*0.178;
    // White sclera
    const ew=new THREE.Mesh(new THREE.SphereGeometry(0.148,22,20),EWH);
    ew.position.set(ex,EYE_Y,EYE_Z);
    ew.scale.set(0.76,1.10,0.50);
    root.add(ew);
    // Pupil
    const ep=new THREE.Mesh(new THREE.SphereGeometry(0.108,18,18),EPU);
    ep.position.set(ex,EYE_Y,EYE_Z+0.06);
    ep.scale.set(0.72,1.08,0.46);
    root.add(ep);
    // Shine
    const es=new THREE.Mesh(new THREE.SphereGeometry(0.034,8,8),SHN);
    es.position.set(ex+side*0.028,EYE_Y+0.046,EYE_Z+0.115);
    root.add(es);
    // Eyelid brow (subtle dark arc)
    const brow=new THREE.Mesh(new THREE.TorusGeometry(0.088,0.016,6,16,Math.PI),DRK);
    brow.position.set(ex,EYE_Y+0.098,EYE_Z+0.02);
    brow.rotation.set(0.12,0,Math.PI); brow.scale.set(1,0.52,0.5);
    root.add(brow);
  }

  // ── CHEEKS
  for(const side of[-1,1]){
    const ck=new THREE.Mesh(new THREE.SphereGeometry(0.09,10,10),PNK);
    ck.position.set(side*0.305,BODY_Y+0.07,0.46);
    ck.scale.set(1.15,0.54,0.36);
    root.add(ck);
  }

  // ── MOUTH
  const mo=new THREE.Mesh(new THREE.SphereGeometry(0.092,12,10),RED);
  mo.position.set(0,BODY_Y-0.082,0.500); mo.scale.set(1.42,0.72,0.40);
  root.add(mo);
  const tg=new THREE.Mesh(new THREE.SphereGeometry(0.062,10,8),TNG);
  tg.position.set(0,BODY_Y-0.108,0.514); tg.scale.set(1.0,0.52,0.40);
  root.add(tg);

  // ── ARMS  — pivoted at shoulder, arm hangs down from pivot
  const armPivots=[];
  for(const side of[-1,1]){
    // Pivot sits at shoulder level on the side of the body
    const pivot=new THREE.Group();
    pivot.position.set(side*0.58, BODY_Y+0.02, 0.04);
    root.add(pivot);

    // Upper arm (rotates around pivot)
    const aGeo=new THREE.CylinderGeometry(0.062,0.052,0.50,10);
    const arm=new THREE.Mesh(aGeo,BLK);
    arm.position.y=-0.25;   // arm hangs below pivot
    arm.castShadow=true;
    pivot.add(arm);

    // Cuff (grey ring at wrist end)
    const cuff=new THREE.Mesh(new THREE.CylinderGeometry(0.072,0.068,0.072,12),GRY);
    cuff.position.y=-0.50; pivot.add(cuff);

    // Glove
    const glv=new THREE.Mesh(new THREE.SphereGeometry(0.12,16,14),WHT);
    glv.position.set(0,-0.64,0.02); glv.scale.set(1.0,0.90,0.82); glv.castShadow=true;
    pivot.add(glv);

    // Knuckle X marks
    for(const off of[-0.032,0.032]){
      const kk=new THREE.Mesh(new THREE.TorusGeometry(0.052,0.012,5,10),GRY);
      kk.position.set(off*side,-0.64,0.08); kk.rotation.y=Math.PI/2; kk.scale.set(0.7,1,0.38);
      pivot.add(kk);
    }

    // Initial arm angle: slightly outward
    pivot.rotation.z = side * 0.35;
    armPivots.push(pivot);
  }

  // ── LEGS — pivot at hip, leg hangs down
  const legPivots=[];
  for(const side of[-1,1]){
    const pivot=new THREE.Group();
    // Hip position: sides of lower body, above feet
    pivot.position.set(side*0.21, 0.52, 0.04);
    root.add(pivot);

    // Thigh + shin
    const legGeo=new THREE.CylinderGeometry(0.102,0.088,0.48,10);
    const leg=new THREE.Mesh(legGeo,BLK);
    leg.position.y=-0.24; leg.castShadow=true;
    pivot.add(leg);

    // Sock (grey)
    const sock=new THREE.Mesh(new THREE.CylinderGeometry(0.096,0.100,0.095,10),GRY);
    sock.position.y=-0.50; pivot.add(sock);

    // Shoe — white sneaker, elongated forward
    const shoe=new THREE.Mesh(new THREE.SphereGeometry(0.152,14,10),WHT);
    shoe.position.set(side*0.018,-0.645,0.055);
    shoe.scale.set(0.94,0.62,1.35);
    shoe.castShadow=true; pivot.add(shoe);

    // Brown sole
    const sole=new THREE.Mesh(new THREE.CylinderGeometry(0.148,0.148,0.036,14),BRN);
    sole.position.set(side*0.018,-0.698,0.055);
    sole.scale.set(0.91,1,1.32); pivot.add(sole);

    // Sole white stripe
    const str=new THREE.Mesh(new THREE.CylinderGeometry(0.150,0.150,0.012,14),WHT);
    str.position.set(side*0.018,-0.676,0.055); str.scale.set(0.90,1,1.31);
    pivot.add(str);

    legPivots.push(pivot);
  }

  return {root, armPivots, legPivots};
}

const {root:flowRoot, armPivots:flowArms, legPivots:flowLegs} = buildFlow();
flowRoot.scale.setScalar(CHAR_SCALE);

// playerWrapper: handles surface orientation; flowRoot is child
const playerWrapper=new THREE.Group();
playerWrapper.add(flowRoot);
scene.add(playerWrapper);

// ── BUZZY THE BEE ─────────────────────────────────────────
function buildBuzzy(){
  const g=new THREE.Group(); // pivot at foot level (y=0)

  const YEL=new THREE.MeshStandardMaterial({color:0xf5d000,roughness:0.5,metalness:0.05});
  const BLK=new THREE.MeshStandardMaterial({color:0x0e0e0e,roughness:0.8});
  const EWM=new THREE.MeshStandardMaterial({color:0xfafafa,roughness:0.2});
  const EPM=new THREE.MeshStandardMaterial({color:0x080814,roughness:0.05,metalness:0.4});
  const WNG=new THREE.MeshStandardMaterial({color:0xd8f0ff,transparent:true,opacity:0.55,roughness:0.05,side:THREE.DoubleSide});
  const STM=new THREE.MeshStandardMaterial({color:0xaa0000,roughness:0.6});

  const CY=0.7; // body centre height

  // Abdomen (large striped oval)
  const abd=new THREE.Mesh(new THREE.SphereGeometry(0.38,20,18),YEL);
  abd.position.set(0,CY,0); abd.scale.set(1,1.22,1); abd.castShadow=true; g.add(abd);

  // Black stripes (rings)
  [-0.10,0.10,0.28].forEach(dy=>{
    const stripe=new THREE.Mesh(new THREE.TorusGeometry(0.38,0.072,8,24),BLK);
    stripe.position.set(0,CY+dy,0); stripe.rotation.x=Math.PI/2; stripe.scale.z=0.72; g.add(stripe);
  });

  // Thorax (smaller sphere connecting head to abdomen)
  const thor=new THREE.Mesh(new THREE.SphereGeometry(0.22,14,14),YEL);
  thor.position.set(0,CY+0.54,0.08); g.add(thor);

  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.28,16,16),YEL);
  head.position.set(0,CY+0.82,0.1); head.castShadow=true; g.add(head);

  // Big friendly eyes
  for(const side of[-1,1]){
    const ew=new THREE.Mesh(new THREE.SphereGeometry(0.11,12,12),EWM);
    ew.position.set(side*0.105,CY+0.88,0.24); ew.scale.set(0.82,1.02,0.52); g.add(ew);
    const ep=new THREE.Mesh(new THREE.SphereGeometry(0.076,10,10),EPM);

// ── DR. LEAF ──────────────────────────────────────────────
function buildDrLeaf(){
  const g=new THREE.Group();

  const BUD=new THREE.MeshStandardMaterial({color:0x2aa030,roughness:0.8});
  const BMP=new THREE.MeshStandardMaterial({color:0x38c040,roughness:0.82});
  const COT=new THREE.MeshStandardMaterial({color:0xeeeeee,roughness:0.38});
  const SUT=new THREE.MeshStandardMaterial({color:0x1a2a4a,roughness:0.65});
  const SKN=new THREE.MeshStandardMaterial({color:0x32a838,roughness:0.72});
  const GLS=new THREE.MeshStandardMaterial({color:0x1a1a1a,metalness:0.8,roughness:0.2});
  const TIE=new THREE.MeshStandardMaterial({color:0x8800aa,roughness:0.5});
  const BLK=new THREE.MeshStandardMaterial({color:0x0c0c0c,roughness:0.5,metalness:0.2});
  const EWM=new THREE.MeshStandardMaterial({color:0xfafafa,roughness:0.2});
  const EPM=new THREE.MeshStandardMaterial({color:0x080814,roughness:0.05,metalness:0.4});
  const STT=new THREE.MeshStandardMaterial({color:0x888888,metalness:0.7,roughness:0.2});
  const BTN=new THREE.MeshStandardMaterial({color:0xaaaaaa,metalness:0.6,roughness:0.3});

  // Legs
  for(const side of[-1,1]){
    const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.10,0.086,0.58,10),SUT);
    leg.position.set(side*0.14,0.29,0); leg.castShadow=true; g.add(leg);
    const shoe=new THREE.Mesh(new THREE.SphereGeometry(0.115,10,8),BLK);
    shoe.position.set(side*0.155,0.022,0.042); shoe.scale.set(0.85,0.52,1.2); g.add(shoe);
  }

  // Torso (lab coat)
  const torso=new THREE.Mesh(new THREE.CapsuleGeometry(0.30,0.58,8,14),COT);
  torso.position.set(0,0.85,0); torso.castShadow=true; g.add(torso);

  // Lapels
  for(const side of[-1,1]){
    const lp=new THREE.Mesh(new THREE.SphereGeometry(0.16,8,7),COT);
    lp.position.set(side*0.17,1.0,0.25); lp.scale.set(0.55,1.1,0.4); g.add(lp);
    const shirt=new THREE.Mesh(new THREE.SphereGeometry(0.11,8,7),SUT);
    shirt.position.set(side*0.07,0.92,0.27); shirt.scale.set(0.5,1.1,0.4); g.add(shirt);
  }

  // Tie
  const tie=new THREE.Mesh(new THREE.SphereGeometry(0.065,8,7),TIE);
  tie.position.set(0,0.88,0.28); tie.scale.set(0.52,2.0,0.36); g.add(tie);

  // Coat buttons
  [1.02,0.88,0.74].forEach(y=>{
    const btn=new THREE.Mesh(new THREE.SphereGeometry(0.028,6,6),BTN);
    btn.position.set(0,y,0.28); g.add(btn);
  });

  // Arms (coat sleeves)
  for(const side of[-1,1]){
    const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.115,0.096,0.58,10),COT);
    arm.position.set(side*0.43,0.80,0); arm.rotation.z=side*0.52; arm.castShadow=true; g.add(arm);
    const hand=new THREE.Mesh(new THREE.SphereGeometry(0.10,10,10),SKN);
    hand.position.set(side*0.60,0.55,0.0); hand.scale.set(0.9,0.75,0.75); g.add(hand);
  }

  // Stethoscope
  const stet=new THREE.Mesh(new THREE.TorusGeometry(0.24,0.022,6,22,Math.PI*1.25),STT);
  stet.position.set(0,0.98,0.24); stet.rotation.x=0.7; g.add(stet);
  const stetEnd=new THREE.Mesh(new THREE.SphereGeometry(0.055,8,8),STT);
  stetEnd.position.set(0,0.72,0.27); g.add(stetEnd);

  // Head (bumpy bud)
  const hGeo=new THREE.SphereGeometry(0.32,32,32);
  const hP=hGeo.attributes.position;
  for(let i=0;i<hP.count;i++){
    let x=hP.getX(i),y=hP.getY(i),z=hP.getZ(i);
    const l=Math.sqrt(x*x+y*y+z*z);
    const yn=y/l;
    const bmp=Math.sin(x*12)*Math.cos(y*11)*Math.sin(z*13)*0.038+Math.cos(y*16)*0.018;
    const r=(0.32+bmp)*(1+Math.max(0,yn)*0.16);
    const s=r/l; hP.setXYZ(i,x*s,y*s,z*s);
  }
  hGeo.computeVertexNormals();
  const head=new THREE.Mesh(hGeo,BUD);
  head.position.set(0,1.42,0); head.castShadow=true; g.add(head);

  // Glasses frames
  for(const side of[-1,1]){

  const bridge=new THREE.Mesh(new THREE.CylinderGeometry(0.012,0.012,0.086,6),GLS);
  bridge.position.set(0,1.48,0.30); bridge.rotation.z=Math.PI/2; g.add(bridge);

  // Eyes (behind glasses)
  for(const side of[-1,1]){
    const ew=new THREE.Mesh(new THREE.SphereGeometry(0.072,10,10),EWM);
    ew.position.set(side*0.118,1.48,0.302); ew.scale.set(0.80,0.96,0.44); g.add(ew);
    const ep=new THREE.Mesh(new THREE.SphereGeometry(0.050,8,8),EPM);
    ep.position.set(side*0.118,1.48,0.32); ep.scale.set(0.76,0.95,0.42); g.add(ep);
  }

  // Mouth (slight smile — distinguished)
  const mth=new THREE.Mesh(new THREE.TorusGeometry(0.068,0.016,6,14,Math.PI*.60),
    new THREE.MeshStandardMaterial({color:0x200000,roughness:0.7}));
  mth.position.set(0,1.40,0.30); mth.rotation.set(0.1,0,Math.PI+0.25); g.add(mth);

  // Bump clusters on head
  [[.22,.16],[-.22,.14],[.05,.28],[-.06,.25],[.14,-.04],[-.14,-.02]].forEach(([dx,dz])=>{
    const bm=new THREE.Mesh(new THREE.SphereGeometry(0.055,8,8),BMP);
    bm.position.set(dx,1.44+Math.random()*.06,dz); g.add(bm);
  });

  return g;
}

// Touch joystick (left 60% of screen)
const jBase=document.getElementById('jbase');
const jRing=document.getElementById('run-ring');
const jNub=document.getElementById('jnub');

let jTouchId=null, jOrigin={x:0,y:0}, jVec={x:0,y:0};
let jRunning=false, jActive=false;
let jLastTapT=0, jTapN=0;

function setJPos(x,y,show=true){
  const s=show?'block':'none';
  jBase.style.display=s; jNub.style.display=s;
  jBase.style.left=x+'px'; jBase.style.top=y+'px';
  jNub.style.left=x+'px';  jNub.style.top=y+'px';
  jRing.style.display=jRunning&&show?'block':'none';
  jRing.style.left=x+'px'; jRing.style.top=y+'px';
}

addEventListener('touchstart',e=>{
  const isCamSide = e.changedTouches[0].clientX > innerWidth*0.58;
  if(isCamSide) return;
  e.preventDefault();
  const t=e.changedTouches[0];
  const now=Date.now();
  if(now-jLastTapT<300){ jTapN++; } else { jTapN=1; }
  jLastTapT=now;
  jRunning=(jTapN>=2);
  jTouchId=t.identifier;
  jOrigin={x:t.clientX,y:t.clientY};
  jVec={x:0,y:0};
  jActive=true;
  setJPos(t.clientX,t.clientY,true);
},{passive:false});

addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===jTouchId){
      const dx=t.clientX-jOrigin.x, dy=t.clientY-jOrigin.y;
      const maxR=50;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const cl=Math.min(len,maxR);
      jVec={x:dx/len*cl/maxR, y:dy/len*cl/maxR};
      const nx=jOrigin.x+dx/len*cl, ny=jOrigin.y+dy/len*cl;
      jNub.style.left=nx+'px'; jNub.style.top=ny+'px';
    } else {
      // right side = camera drag
      camDragMove(t.clientX,t.clientY);
    }
  }
},{passive:false});

addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier===jTouchId){
      jActive=false; jVec={x:0,y:0};
      setJPos(0,0,false);
    } else {
      camDragEnd();
    }
  }
},{passive:false});

// Camera drag (right side touch + right mouse)
let camDragPrev=null, camYawOffset=0;
function camDragStart(x,y){ camDragPrev={x,y}; }
function camDragMove(x,y){
  if(!camDragPrev)return;
  camYawOffset-=(x-camDragPrev.x)*0.007;
  camDragPrev={x,y};
}
function camDragEnd(){ camDragPrev=null; }

addEventListener('touchstart',e=>{
  if(e.changedTouches[0].clientX>innerWidth*0.58){
    e.preventDefault();
    camDragStart(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
  }
},{passive:false});

canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('mousedown',e=>{if(e.button===2)camDragStart(e.clientX,e.clientY);});
canvas.addEventListener('mousemove',e=>{if(e.buttons&2)camDragMove(e.clientX,e.clientY);});
canvas.addEventListener('mouseup',  e=>{if(e.button===2)camDragEnd();});

function updatePlayer(dt){
  let mx=0, mz=0;
  if(jActive){ mx=jVec.x; mz=jVec.y; }
  if(keys['w']||keys['arrowup'])    mz=-1;
  if(keys['s']||keys['arrowdown'])  mz= 1;

  isRunning=(jRunning&&jActive)||(keys['shift']||keys['Meta']||keys['control']);

  const up=playerDir.clone().normalize();

  // Keep facing vector perpendicular to current surface normal at all times
  playerFacingVec.sub(up.clone().multiplyScalar(playerFacingVec.dot(up)));
  if(playerFacingVec.lengthSq()<0.0001){
    const arb=Math.abs(up.x)<0.9?new THREE.Vector3(1,0,0):new THREE.Vector3(0,0,1);
    playerFacingVec.crossVectors(up,arb);
  }
  playerFacingVec.normalize();

  // ── Dialogue: lock movement, slowly turn to face NPC ──
  if(dlgOpen){
    if(dlgTurnTarget){
      const slerpQ=new THREE.Quaternion();
      const cur=playerFacingVec.clone();
      const targ=dlgTurnTarget.clone();
      // Angle between current facing and target (around up axis)
      const cross=new THREE.Vector3().crossVectors(cur,targ);
      const sign=Math.sign(cross.dot(up))||1;
      const angle=cur.angleTo(targ);
      const turnStep=Math.min(angle, 0.06); // smooth fixed-rate turn
      if(angle>0.01){
        const q=new THREE.Quaternion().setFromAxisAngle(up, sign*turnStep);
        playerFacingVec.applyQuaternion(q).normalize();
        playerFacingVec.sub(up.clone().multiplyScalar(playerFacingVec.dot(up))).normalize();
      }
    }
    isMoving=false;
    return;
  }

  // ── A/D: rotate facing direction around the surface normal ──
  const turnRate = 0.052; // radians per frame at full input (camera tracks this exactly, 1:1)
  if(Math.abs(mx)>0.05){
    const q=new THREE.Quaternion().setFromAxisAngle(up, -mx*turnRate);
    playerFacingVec.applyQuaternion(q).normalize();
    playerFacingVec.sub(up.clone().multiplyScalar(playerFacingVec.dot(up))).normalize();
    camYawOffset=0; // camera tracks the turn immediately, no lag
  }

  const spd=isRunning?RUN_SPD:WALK_SPD;
  const movingFwd=Math.abs(mz)>0.05;
  isMoving=(Math.abs(mx)>0.05||movingFwd);

  if(movingFwd){
    // If camera has an independent yaw offset, blend facing toward camera-forward first
    if(Math.abs(camYawOffset)>0.01){
      const q=new THREE.Quaternion().setFromAxisAngle(up, camYawOffset);
      const camFwd=playerFacingVec.clone().applyQuaternion(q);
      camFwd.sub(up.clone().multiplyScalar(camFwd.dot(up))).normalize();
      const cross=new THREE.Vector3().crossVectors(playerFacingVec,camFwd);
      const sign=Math.sign(cross.dot(up))||1;
      const angle=playerFacingVec.angleTo(camFwd);
      const turnStep=Math.min(angle,0.10);
      if(angle>0.01){
        const tq=new THREE.Quaternion().setFromAxisAngle(up, sign*turnStep);
        playerFacingVec.applyQuaternion(tq).normalize();
        playerFacingVec.sub(up.clone().multiplyScalar(playerFacingVec.dot(up))).normalize();
      }
      camYawOffset*=0.80;
      if(Math.abs(camYawOffset)<0.01) camYawOffset=0;
    }

    // ── Move along facing direction using PROPER small-angle rotation on the sphere ──
    // The angular step (radians) the player travels this frame:
    const angularStep = spd * (mz<0?1:-1); // mz negative = forward (W) = positive travel
    // Rotation axis = facing direction crossed with up gives the axis to roll around
    // We rotate playerDir around the axis perpendicular to both 'up' and 'facing'
    const rotAxis=new THREE.Vector3().crossVectors(up, playerFacingVec).normalize();
    // Rotating playerDir around rotAxis by angularStep moves it along the facing direction
    const moveQ=new THREE.Quaternion().setFromAxisAngle(rotAxis, angularStep);
    playerDir.applyQuaternion(moveQ).normalize();
    // Carry the facing vector along with the same rotation so it stays tangent
    playerFacingVec.applyQuaternion(moveQ).normalize();
  }

  if(movingFwd||Math.abs(mx)>0.05){
    walkPhase+=dt*(isRunning?9.5:5.0);
    steps++;
    if(steps%8===0) document.getElementById('h-steps').textContent=Math.floor(steps/8)+' steps';
  }
}

function orientPlayerWrapper(){
  const up=playerDir.clone().normalize();
  const fwd=playerFacingVec.clone().normalize();
  fwd.sub(up.clone().multiplyScalar(fwd.dot(up))).normalize();

  // Robust orientation: align local +Y to surface up, then twist around that axis
  // so local +Z (the side the character's face/eyes are modelled on) points along
  // fwd. Verified correct at every point on the sphere, including poles.
  const worldUp=new THREE.Vector3(0,1,0);
  const qAlign=new THREE.Quaternion().setFromUnitVectors(worldUp, up);
  const currentFace=new THREE.Vector3(0,0,1).applyQuaternion(qAlign); // local +Z = face side
  const cross=new THREE.Vector3().crossVectors(currentFace, fwd);
  const sign=Math.sign(cross.dot(up))||1;
  let angle=currentFace.angleTo(fwd);
  if(cross.length()<1e-6 && currentFace.dot(fwd)<0) angle=Math.PI;
  const qTwist=new THREE.Quaternion().setFromAxisAngle(up, sign*angle);
  const qFinal=qTwist.multiply(qAlign);

  playerWrapper.quaternion.copy(qFinal);
  // Place SOLES exactly on the displaced terrain: ground radius + foot offset
  const groundR=terrainRadius(up) + FOOT_OFFSET;
  playerWrapper.position.copy(up.clone().multiplyScalar(groundR));
}

// ══════════════════════════════════════════════════════════════
// ANIMATE FLOW LIMBS
// ══════════════════════════════════════════════════════════════
function animateFlow(){
  if(isMoving){
    const sw=isRunning?0.80:0.46;
    const freq=1.0;
    // Leg swing: opposite phases, rotation around X axis of pivot
    flowLegs[0].rotation.x= Math.sin(walkPhase*freq)    * sw;
    flowLegs[1].rotation.x= Math.sin(walkPhase*freq+Math.PI) * sw;
    // Arm swing: opposite to legs
    const asw=isRunning?0.62:0.35;
    flowArms[0].rotation.x= Math.sin(walkPhase*freq+Math.PI) * asw;
    flowArms[1].rotation.x= Math.sin(walkPhase*freq)    * asw;
    // Body bob
    flowRoot.position.y=Math.abs(Math.sin(walkPhase*freq))*(isRunning?0.14:0.07);
    // Running: lean forward + slight roll
    flowRoot.rotation.x=isRunning?0.24:0.05;
    flowRoot.rotation.z=isRunning?Math.sin(walkPhase)*0.10:0;
  } else {
    // Idle: gentle breathe
    const t=Date.now()*0.001;
    flowRoot.position.y=Math.sin(t*1.3)*0.022;
    flowArms[0].rotation.x=Math.sin(t*0.8)*0.07;
    flowArms[1].rotation.x=Math.sin(t*0.8+Math.PI)*0.07;
    flowLegs[0].rotation.x=0;
    flowLegs[1].rotation.x=0;
    flowRoot.rotation.x=0;
    flowRoot.rotation.z=0;
  }
}

// ══════════════════════════════════════════════════════════════
// CAMERA: fixed behind player, follows planet curve
// ══════════════════════════════════════════════════════════════
function updateCamera(){
  const up=playerDir.clone().normalize();
  const groundR=terrainRadius(up) + FOOT_OFFSET;
  const footPos=up.clone().multiplyScalar(groundR);

  // Camera forward = player facing, rotated by any manual orbit offset
  let camFwd=playerFacingVec.clone();
  if(Math.abs(camYawOffset)>0.0001){
    const q=new THREE.Quaternion().setFromAxisAngle(up, camYawOffset);
    camFwd.applyQuaternion(q);
    camFwd.sub(up.clone().multiplyScalar(camFwd.dot(up))).normalize();
  }
  const behindDir=camFwd.clone().negate();

  const target=footPos.clone().addScaledVector(up, 0.95);
  const desired=footPos.clone()
    .addScaledVector(behindDir, CAM_BACK)
    .addScaledVector(up, CAM_UP);

  if(!camReady){ camSmooth.copy(desired); camReady=true; }
  camSmooth.lerp(desired, 0.18);

  // CRITICAL: camera.up must always match the local surface normal, not the
  // world Y axis. Without this, lookAt() rolls the camera to keep world-up
  // "up" on screen, which flips the view upside-down once the player walks
  // to where the surface normal points mostly downward in world space.
  camera.up.copy(up);
  camera.position.copy(camSmooth);
  camera.lookAt(target);
}

// ══════════════════════════════════════════════════════════════
// NPC IDLE ANIMATIONS
// ══════════════════════════════════════════════════════════════
function updateFlowers(t){
  flowerObjs.forEach(({wrapper,flower})=>{
    flower.rotation.z=Math.sin(t*0.8+flower.userData.swayPhase)*0.055;
    flower.rotation.x=Math.cos(t*0.7+flower.userData.swayPhase)*0.040;
  });
}

// ══════════════════════════════════════════════════════════════
// BUTTERFLY ANIMATION
// ══════════════════════════════════════════════════════════════
function updateButterflies(t){
  butterflies.forEach(b=>{
    const{orbitDir,radius,spd}=b.userData;
    b.userData.ang+=spd*0.010;
    b.userData.flapPh+=0.22;
    const base=orbitDir.clone().multiplyScalar(PR+0.5);
    let r2=new THREE.Vector3(0,0,1);
    if(Math.abs(orbitDir.dot(r2))>0.9) r2.set(1,0,0);
    const t1=new THREE.Vector3().crossVectors(orbitDir,r2).normalize();
    const t2=new THREE.Vector3().crossVectors(orbitDir,t1).normalize();
    const pos=base.clone()
      .addScaledVector(t1,Math.cos(b.userData.ang)*radius)
      .addScaledVector(t2,Math.sin(b.userData.ang)*radius)
      .addScaledVector(orbitDir,Math.sin(t*0.8+b.userData.ang)*0.3);
    b.position.copy(pos);
    const flapAmt=Math.abs(Math.sin(b.userData.flapPh))*1.5+0.5;
    // Wings are children 0 and 1
    if(b.children[0]) b.children[0].scale.x= flapAmt*1.7;
    if(b.children[1]) b.children[1].scale.x=-flapAmt*1.7;
    b.lookAt(pos.clone().addScaledVector(t1,Math.cos(b.userData.ang+.5)));
  });
}

// ══════════════════════════════════════════════════════════════
// NPC IDLE + FACE PLAYER
// ══════════════════════════════════════════════════════════════
function updateNPCs(t){
  npcInstances.forEach(({wrapper,inner,def})=>{
    inner.position.y=Math.sin(t*1.1+def.dir.x*4)*0.06;
    if(def.name==='Buzzy'){
      inner.userData.flapPh=(inner.userData.flapPh||0)+0.28;
      const fl=Math.abs(Math.cos(inner.userData.flapPh))*0.38+0.62;
      if(inner.userData.wingMeshes){
        inner.userData.wingMeshes.forEach((w,i)=>{
          w.scale.x=(i%2===0?1:-1)*fl*(i<2?1.6:1.25);
          w.scale.z=fl;
        });
      }
      inner.position.y=Math.sin(t*2.8)*0.11;
    }
    if(def.name==='Kronik Trip'){
      inner.rotation.z=Math.sin(t*0.9)*0.10;
    }
    // Face toward player
    const npcWP=new THREE.Vector3(); wrapper.getWorldPosition(npcWP);
    const playerWP=new THREE.Vector3(); playerWrapper.getWorldPosition(playerWP);
    const toP=playerWP.clone().sub(npcWP).normalize();
    const sn=def.dir.clone().normalize();
    const flat=toP.clone().projectOnPlane(sn).normalize();
    if(flat.lengthSq()>0.01){
      const nFwd=new THREE.Vector3(0,0,1).applyQuaternion(wrapper.quaternion);
      const nUp=new THREE.Vector3(0,1,0).applyQuaternion(wrapper.quaternion);
      const nRight=new THREE.Vector3().crossVectors(nUp,nFwd);
      const ang=Math.atan2(flat.dot(nRight),flat.dot(nFwd));
      inner.rotation.y=THREE.MathUtils.lerp(inner.rotation.y,ang,0.05);
    }
  });
}



// ══════════════════════════════════════════════════════════════
// DAY / NIGHT CYCLE
// ══════════════════════════════════════════════════════════════
let dayT=0.28;
const DAY_NAMES=['Night','Dawn','Morning','Noon','Afternoon','Dusk'];
function updateDayNight(dt){
  dayT=(dayT+dt*0.006)%1;
  const d=Math.max(0,Math.sin(dayT*Math.PI));
  const dw=Math.max(0,Math.sin(dayT*Math.PI*2));
  skyUniforms.skyTop.value.setHSL(0.62,0.7,0.03+d*0.22);
  skyUniforms.skyMid.value.setHSL(0.58+dw*0.04,0.55,0.18+d*0.38);
  skyUniforms.skyHor.value.setHSL(0.36,0.4,0.22+d*0.32);
  sun.position.set(Math.cos(dayT*Math.PI*2)*55,Math.sin(dayT*Math.PI*2)*60+5,22);
  skyUniforms.sunDir.value.copy(sun.position).normalize();
  sun.intensity=d*5.0+0.1;
  hemi.intensity=0.4+d*1.8;
  scene.fog.color.setHSL(0.38,0.25,0.20+d*0.45);
  document.getElementById('h-time').textContent=DAY_NAMES[Math.floor(dayT*6)];
}

// ══════════════════════════════════════════════════════════════
// PROXIMITY + INTERACT
// ══════════════════════════════════════════════════════════════
let nearNpc=null;
function checkNearNpc(){
  const pp=new THREE.Vector3();
  playerWrapper.getWorldPosition(pp);
  let closest=null, closestD=4.2;
  npcInstances.forEach(n=>{
    const np=new THREE.Vector3();
    n.wrapper.getWorldPosition(np);
    const d=pp.distanceTo(np);
    if(d<closestD){ closestD=d; closest=n; }
  });
  nearNpc=closest;
  const prompt=document.getElementById('interact-prompt');
  if(closest&&!dlgOpen){
    prompt.style.opacity='1';
    document.getElementById('ip-name').textContent=closest.def.name;
    document.getElementById('ip-action').textContent=IS_TOUCH?'tap to talk':'press E';
  } else {
    prompt.style.opacity='0';
  }
}

function tryInteract(){
  if(dlgOpen){ window.dlgNext(); return; }
  if(nearNpc) openDlg(nearNpc);
}

// Tap to interact on mobile (left side, short tap)
canvas.addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientX>innerWidth*0.58) return;
  const t=e.changedTouches[0];
  if(Math.abs(t.clientX-jOrigin.x)<14&&Math.abs(t.clientY-jOrigin.y)<14){
    tryInteract();
  }
},{passive:true});

// Direct tap on the interact prompt itself always works, regardless of screen zone
document.getElementById('interact-prompt').addEventListener('touchend',e=>{
  e.preventDefault();
  e.stopPropagation();
  tryInteract();
},{passive:false});
document.getElementById('interact-prompt').addEventListener('click',e=>{
  e.preventDefault();
  tryInteract();
});

// ══════════════════════════════════════════════════════════════
// DIALOGUE SYSTEM
// ══════════════════════════════════════════════════════════════
let dlgOpen=false, dlgNpc=null, dlgIdx=0;
let dlgTurnTarget=null; // world-space facing vec to turn toward when dialogue opens

function openDlg(npc){
  dlgNpc=npc; dlgIdx=0; dlgOpen=true;

  // Compute the world-space direction from player to NPC, projected on surface
  const playerWP=new THREE.Vector3(); playerWrapper.getWorldPosition(playerWP);
  const npcWP=new THREE.Vector3();    npc.wrapper.getWorldPosition(npcWP);
  const up=playerDir.clone().normalize();
  const toNpc=npcWP.clone().sub(playerWP).normalize();
  // Project onto surface tangent
  toNpc.sub(up.clone().multiplyScalar(toNpc.dot(up)));
  if(toNpc.lengthSq()>0.001){
    dlgTurnTarget=toNpc.normalize();
  } else {
    dlgTurnTarget=null;
  }

  document.getElementById('dlg-emoji').textContent=npc.def.emoji;
  document.getElementById('dlg-name').textContent=npc.def.name.toUpperCase();
  document.getElementById('dlg-text').textContent=npc.def.lines[0];
  document.getElementById('dlg').classList.add('show');
  document.getElementById('interact-prompt').style.opacity='0';
}

window.dlgNext=function(){
  if(!dlgNpc)return;
  dlgIdx++;
  if(dlgIdx>=dlgNpc.def.lines.length){
    document.getElementById('dlg').classList.remove('show');
    dlgTurnTarget=null;
    setTimeout(()=>{dlgOpen=false;dlgNpc=null;},380);
    return;
  }
  document.getElementById('dlg-text').textContent=dlgNpc.def.lines[dlgIdx];
};

// ══════════════════════════════════════════════════════════════
// GAME START
// ══════════════════════════════════════════════════════════════
let started=false;
window.startGame=function(){
  document.getElementById('title').style.display='none';
  started=true;
};

// ══════════════════════════════════════════════════════════════
// MAIN RENDER LOOP
// ══════════════════════════════════════════════════════════════
const clock=new THREE.Clock();
let gt=0;

function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05);
  gt+=dt;

  waterUniforms.time.value=gt;
  skyDome.rotation.y+=dt*.0004;

  if(!started){ renderer.render(scene,camera); return; }

  updateDayNight(dt);
  updatePlayer(dt);
  orientPlayerWrapper();
  animateFlow();
  updateCamera();
  updateNPCs(gt);
  updateButterflies(gt);
  updateFlowers(gt);
  checkNearNpc();

  renderer.render(scene,camera);
}
loop();

// ══════════════════════════════════════════════════════════════
// RESIZE
// ══════════════════════════════════════════════════════════════
addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
